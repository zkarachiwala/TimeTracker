name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pages: write

concurrency:
  group: deploy-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  check:
    name: Check for code changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      code: ${{ steps.diff.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Diff against parent commit
        id: diff
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "code=true" >> $GITHUB_OUTPUT
            echo "Manual dispatch — deploying everything."
          elif git diff --name-only HEAD~1 HEAD | grep -qE '\.(cs|razor|csproj|sln|css)$'; then
            echo "code=true" >> $GITHUB_OUTPUT
          else
            echo "code=false" >> $GITHUB_OUTPUT
            echo "No app code changed — skipping deploy and Playwright tests."
          fi

  deploy:
    name: Publish & Deploy
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.code == 'true' }}

    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore TimeTracker.sln --locked-mode

      - name: Publish
        run: >
          dotnet publish TimeTracker.Web/TimeTracker.Web.csproj
          --configuration Release
          --output ./publish

      - name: Set startup command
        run: |
          RG=$(az webapp list --query "[?name=='${{ vars.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          az webapp config set --name ${{ vars.AZURE_WEBAPP_NAME }} --resource-group "$RG" --startup-file "dotnet TimeTracker.Web.dll"

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ./publish

  smoke:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: [check, deploy]
    if: ${{ needs.check.outputs.code == 'true' }}

    steps:
      - name: Assert login page is up
        run: |
          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://timetracker-zak.azurewebsites.net/login)
            echo "Attempt $i: login page returned HTTP $HTTP_CODE"
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Waiting 15s before retry..."
            sleep 15
          done
          echo "Smoke test failed after 5 attempts — last status $HTTP_CODE"
          exit 1

  showcase:
    name: Deploy Showcase to GitHub Pages
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.code == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Publish Showcase
        run: >
          dotnet publish TimeTracker.Client/TimeTracker.Client.csproj
          --configuration Release
          -p:Showcase=true
          -p:DefineConstants=SHOWCASE
          --output ./showcase-output

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./showcase-output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
