name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Publish & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TimeTracker.sln

      - name: Publish
        run: >
          dotnet publish TimeTracker.Web/TimeTracker.Web.csproj
          --configuration Release
          --output ./publish

      - name: Set startup command
        run: |
          RG=$(az webapp list --query "[?name=='${{ vars.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          az webapp config set --name ${{ vars.AZURE_WEBAPP_NAME }} --resource-group "$RG" --startup-file "dotnet TimeTracker.Web.dll"

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ./publish

  playwright:
    name: Playwright UX Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build
        run: |
          dotnet restore TimeTracker.Playwright/TimeTracker.Playwright.csproj
          dotnet build TimeTracker.Playwright/TimeTracker.Playwright.csproj --no-restore --configuration Release

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('**/TimeTracker.Playwright.csproj') }}

      - name: Install Playwright browsers
        run: pwsh TimeTracker.Playwright/bin/Release/net10.0/playwright.ps1 install chromium --with-deps

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: https://timetracker-zak.azurewebsites.net
        run: >
          dotnet test TimeTracker.Playwright/TimeTracker.Playwright.csproj
          --no-build --configuration Release
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=playwright-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: TimeTracker.Playwright/TestResults/
          retention-days: 14
