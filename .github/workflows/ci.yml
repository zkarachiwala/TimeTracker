name: CI

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.cs'
      - '**/*.razor'
      - '**/*.csproj'
      - '**/*.sln'
      - '**/*.css'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.cs'
      - '**/*.razor'
      - '**/*.csproj'
      - '**/*.sln'
      - '**/*.css'

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TimeTracker.sln

      - name: Build
        run: dotnet build TimeTracker.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test TimeTracker.sln --no-build --configuration Release --logger "console;verbosity=normal"
