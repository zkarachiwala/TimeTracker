name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          if git diff --name-only $BASE...HEAD 2>/dev/null | grep -qE '\.(cs|razor|csproj|sln|css)$'; then
            echo "code=true" >> $GITHUB_OUTPUT
          else
            echo "code=false" >> $GITHUB_OUTPUT
            echo "No code changes — skipping build."
          fi

      - name: Setup .NET
        if: steps.changes.outputs.code == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        if: steps.changes.outputs.code == 'true'
        run: dotnet restore TimeTracker.sln

      - name: Build
        if: steps.changes.outputs.code == 'true'
        run: dotnet build TimeTracker.sln --no-restore --configuration Release

      - name: Test
        if: steps.changes.outputs.code == 'true'
        run: dotnet test TimeTracker.sln --no-build --configuration Release --logger "console;verbosity=normal"
